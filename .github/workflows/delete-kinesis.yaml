name: Delete Kinesis Ingestion Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_delete:
        description: 'Type "DELETE" to confirm stack teardown'
        required: true
        default: "NO"

jobs:
  delete-stack:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_delete == 'DELETE'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete CloudFormation Stack
        run: |
          aws cloudformation delete-stack --stack-name sentinel-kinesis-stack
          echo "Waiting for Kinesis stack deletion..."
          aws cloudformation wait stack-delete-complete --stack-name sentinel-kinesis-stack
